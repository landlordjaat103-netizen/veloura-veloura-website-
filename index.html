<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veloura - Fashion for Her</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .product-card { transition: all 0.4s ease; }
    .product-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
    .cart-sidebar { transform: translateX(100%); transition: all 0.4s ease; }
    .cart-sidebar.open { transform: translateX(0); }
  </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-lg sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-4xl font-bold text-pink-600">Veloura</h1>
    <div class="flex items-center gap-8 text-3xl">
      <div onclick="toggleCart()" class="relative cursor-pointer">
        <i class="fa-solid fa-shopping-cart"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-pink-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
      </div>
      <i onclick="showAdmin()" class="fa-solid fa-user-shield cursor-pointer"></i>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-12">
  <h2 class="text-5xl font-bold text-center mb-12">Our Elegant Collection</h2>
  <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 gap-8"></div>
</div>

<!-- Cart Sidebar -->
<div id="cart-sidebar" class="cart-sidebar fixed top-0 right-0 h-full w-96 bg-white shadow-2xl z-50 overflow-auto">
  <div class="p-6">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold">Your Cart</h2>
      <button onclick="toggleCart()" class="text-4xl">✕</button>
    </div>
    <div id="cart-items" class="space-y-6"></div>
    <div class="mt-8 pt-6 border-t">
      <div class="flex justify-between text-2xl font-bold">
        <span>Total</span>
        <span id="cart-total">₹0</span>
      </div>
      <button onclick="checkout()" class="w-full mt-6 bg-pink-600 text-white py-5 rounded-2xl text-xl">Proceed to Checkout</button>
    </div>
  </div>
</div>

<script>
  const products = [
    {id:1, name:"Blush Pink Maxi Dress", price:3299, image:"https://picsum.photos/id/1015/600/800"},
    {id:2, name:"Cream Silk Blouse", price:1899, image:"https://picsum.photos/id/1027/600/800"},
    {id:3, name:"High Waist Jeans", price:2599, image:"https://picsum.photos/id/106/600/800"},
    {id:4, name:"Pearl Hoop Earrings", price:899, image:"https://picsum.photos/id/201/600/800"}
  ];

  let cart = [];

  function renderProducts() {
    document.getElementById("products-grid").innerHTML = products.map(p => `
      <div class="product-card bg-white rounded-3xl overflow-hidden shadow-xl">
        <img src="${p.image}" class="w-full h-72 object-cover">
        <div class="p-6">
          <h3 class="font-semibold text-xl">${p.name}</h3>
          <p class="text-3xl font-bold text-pink-600 mt-2">₹${p.price}</p>
          <button onclick="addToCart(${p.id})" class="mt-6 w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-2xl font-medium">Add to Cart</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push({...product, qty: 1});
    updateCartCount();
    alert(`${product.name} added to cart 💖`);
  }

  function updateCartCount() {
    document.getElementById("cart-count").textContent = cart.length;
  }

  function toggleCart() {
    const sidebar = document.getElementById("cart-sidebar");
    sidebar.classList.toggle("open");
    renderCart();
  }

  function renderCart() {
    let html = '';
    let total = 0;
    cart.forEach((item, index) => {
      total += item.price * item.qty;
      html += `
        <div class="flex gap-4 border-b pb-4">
          <img src="${item.image}" class="w-20 h-20 object-cover rounded-2xl">
          <div class="flex-1">
            <h4 class="font-medium">${item.name}</h4>
            <p class="text-pink-600">₹${item.price}</p>
            <button onclick="removeFromCart(${index})" class="text-red-500 text-sm mt-2">Remove</button>
          </div>
        </div>`;
    });
    document.getElementById("cart-items").innerHTML = html || "<p class='text-center py-12 text-gray-400'>Cart is empty</p>";
    document.getElementById("cart-total").textContent = `₹${total}`;
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
    updateCartCount();
  }

  function checkout() {
    if (cart.length === 0) return;
    const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    alert(`Total Amount: ₹${total}\n\nUPI Payment + Screenshot feature next update mein aa jayega!`);
    // Yahan baad mein full checkout modal add karenge
  }

  function showAdmin() {
    alert("👑 Admin Panel\n\nProducts manage karne ke liye GitHub se code update kar sakte ho.");
  }

  // Initialize
  renderProducts();
</script>
</body>
</html>
