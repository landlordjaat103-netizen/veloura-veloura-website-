<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veloura - Fashion for Her</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    .product-card:hover { transform: translateY(-8px); }
  </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-md sticky top-0 z-50 p-4">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="text-4xl font-bold text-pink-600">Veloura</h1>
    <div class="flex gap-6 text-3xl">
      <i onclick="toggleCart()" class="fa-shopping-cart cursor-pointer"></i>
      <i onclick="showAdmin()" class="fa-user-shield cursor-pointer"></i>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto p-4">
  <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-6"></div>
</div>

<!-- Cart Sidebar -->
<div id="cart-sidebar" class="fixed top-0 right-0 h-full w-96 bg-white shadow-2xl translate-x-full transition-all z-50 p-6 overflow-auto">
  <h2 class="text-2xl font-bold mb-6">Your Cart</h2>
  <div id="cart-items"></div>
  <button onclick="showCheckout()" class="w-full bg-pink-600 text-white py-4 rounded-2xl mt-8">Checkout</button>
</div>

<!-- Checkout Modal -->
<div id="checkout-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center">
  <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4">
    <h2 class="text-3xl font-bold mb-6">Checkout</h2>
    <div id="checkout-content"></div>
  </div>
</div>

<!-- Admin Panel -->
<div id="admin-panel" class="hidden fixed inset-0 bg-white z-[200] overflow-auto">
  <div class="p-6 max-w-4xl mx-auto">
    <div class="flex justify-between mb-8">
      <h2 class="text-4xl font-bold">Admin Dashboard</h2>
      <button onclick="hideAdmin()" class="text-4xl">✕</button>
    </div>
    <button onclick="addSampleProducts()" class="bg-green-600 text-white px-6 py-3 rounded-xl mb-6">Add Sample Products</button>
    <h3 class="text-xl font-semibold mb-4">Orders</h3>
    <div id="admin-orders"></div>
  </div>
</div>

<script>
// ============== Firebase Config ==============
const firebaseConfig = {
  apiKey: "AIzaSyD6s36k-KULwjvOl-ffM503euenOMgzo4k",
  authDomain: "veloura-4a1b8.firebaseapp.com",
  projectId: "veloura-4a1b8",
  storageBucket: "veloura-4a1b8.firebasestorage.app",
  messagingSenderId: "1075650635262",
  appId: "1:1075650635262:web:3e8a42ba0fcc48791a0caf",
  measurementId: "G-S83PQNYE3L"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];
let products = [];

// Load Products
async function loadProducts() {
  const snap = await db.collection("products").get();
  products = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById("products-grid");
  grid.innerHTML = products.map(p => `
    <div class="product-card bg-white rounded-3xl overflow-hidden shadow-lg">
      <img src="${p.image}" class="w-full h-64 object-cover">
      <div class="p-4">
        <h3 class="font-semibold text-lg">${p.name}</h3>
        <p class="text-pink-600 text-2xl font-bold">₹${p.price}</p>
        <button onclick="addToCart('${p.id}')" class="mt-4 w-full bg-pink-600 text-white py-3 rounded-2xl">Add to Cart</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push({...product, quantity: 1});
  alert(`${product.name} added to cart 💖`);
}

// Cart Functions
function toggleCart() {
  document.getElementById("cart-sidebar").classList.toggle("translate-x-full");
  renderCart();
}

function renderCart() {
  let html = '';
  let total = 0;
  cart.forEach((item, i) => {
    total += item.price * item.quantity;
    html += `<div class="flex justify-between mb-4"><span>\( {item.name}</span><span>₹ \){item.price}</span></div>`;
  });
  document.getElementById("cart-items").innerHTML = html || "<p>Cart empty</p>";
  // Total bhi add kar sakte ho
}

// Checkout
function showCheckout() {
  if (cart.length === 0) return alert("Cart empty");
  const total = cart.reduce((a,b)=>a + b.price, 0);
  
  document.getElementById("checkout-content").innerHTML = `
    <p class="text-4xl font-bold text-pink-600 mb-6">₹${total}</p>
    <div class="bg-gray-100 p-6 rounded-3xl text-center mb-6">
      <p class="font-medium">Scan QR to Pay</p>
      <img src="https://via.placeholder.com/280x280/ffe4e6/000?text=Veloura+UPI+QR" class="mx-auto my-4">
      <p class="font-mono text-sm">veloura@upi</p>
    </div>
    <input type="file" id="pay-screenshot" accept="image/*" class="w-full border p-4 rounded-2xl mb-6">
    <button onclick="placeOrder()" class="w-full bg-green-600 text-white py-5 rounded-3xl text-xl">Submit Order</button>
  `;
  document.getElementById("checkout-modal").classList.remove("hidden");
}

async function placeOrder() {
  const screenshotInput = document.getElementById("pay-screenshot");
  if (!screenshotInput.files[0]) return alert("Screenshot upload karo!");

  const total = cart.reduce((a,b)=>a + b.price, 0);

  await db.collection("orders").add({
    items: cart,
    total: total,
    date: new Date().toLocaleString(),
    status: "Payment Pending"
  });

  alert("✅ Order Placed! Admin will verify your payment.");
  cart = [];
  toggleCart();
  document.getElementById("checkout-modal").classList.add("hidden");
}

// Admin
async function showAdmin() {
  document.getElementById("admin-panel").classList.remove("hidden");
  const snap = await db.collection("orders").get();
  let html = '';
  snap.forEach(doc => {
    const o = doc.data();
    html += `
      <div class="border p-6 rounded-3xl mb-6">
        <p><strong>Order #${doc.id.slice(0,8)}</strong></p>
        <p>Total: ₹${o.total}</p>
        <p>Status: ${o.status}</p>
        \( {o.status === "Payment Pending" ? `<button onclick="verifyPayment(' \){doc.id}')" class="mt-4 bg-green-600 text-white px-8 py-3 rounded-2xl">Verify Payment</button>` : ''}
      </div>`;
  });
  document.getElementById("admin-orders").innerHTML = html || "<p>No orders yet</p>";
}

async function verifyPayment(id) {
  await db.collection("orders").doc(id).update({status: "Confirmed"});
  alert("Payment Verified!");
  showAdmin();
}

async function addSampleProducts() {
  const samples = [
    {name: "Blush Pink Maxi Dress", price: 3299, image: "https://picsum.photos/id/1015/600/800"},
    {name: "Silk Blouse", price: 1899, image: "https://picsum.photos/id/1027/600/800"},
    {name: "High Waist Jeans", price: 2499, image: "https://picsum.photos/id/106/600/800"}
  ];
  for (let p of samples) {
    await db.collection("products").add(p);
  }
  alert("Sample Products Added!");
  loadProducts();
}

function hideAdmin() {
  document.getElementById("admin-panel").classList.add("hidden");
}

// Start
window.onload = () => {
  loadProducts();
};
</script>
</body>
</html>
