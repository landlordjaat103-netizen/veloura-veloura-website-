<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veloura - Fashion for Her</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .product-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
  </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-lg sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-4xl font-bold text-pink-600">Veloura</h1>
    <div class="flex gap-8 text-3xl">
      <div onclick="toggleCart()" class="relative cursor-pointer">
        <i class="fa-solid fa-shopping-cart"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-pink-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
      </div>
      <i onclick="showAdmin()" class="fa-solid fa-user-shield cursor-pointer"></i>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-12">
  <h2 class="text-5xl font-bold text-center mb-12">Our Elegant Collection</h2>
  <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 gap-8"></div>
</div>

<script>
  const products = [
    {id:1, name:"Blush Pink Maxi Dress", price:3299, image:"https://picsum.photos/id/1015/600/800"},
    {id:2, name:"Cream Silk Blouse", price:1899, image:"https://picsum.photos/id/1027/600/800"},
    {id:3, name:"High Waist Jeans", price:2599, image:"https://picsum.photos/id/106/600/800"},
    {id:4, name:"Pearl Hoop Earrings", price:899, image:"https://picsum.photos/id/201/600/800"}
  ];

  let cart = [];

  function renderProducts() {
    document.getElementById("products-grid").innerHTML = products.map(p => `
      <div class="product-card bg-white rounded-3xl overflow-hidden shadow-xl">
        <img src="${p.image}" class="w-full h-72 object-cover">
        <div class="p-6">
          <h3 class="font-semibold text-xl">${p.name}</h3>
          <p class="text-3xl font-bold text-pink-600">₹${p.price}</p>
          <button onclick="addToCart(${p.id})" class="mt-6 w-full bg-pink-600 text-white py-4 rounded-2xl">Add to Cart</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id) {
    const p = products.find(x => x.id === id);
    cart.push({...p, qty:1});
    document.getElementById("cart-count").textContent = cart.length;
    alert(p.name + " added to cart 💖");
  }

  function toggleCart() {
    let msg = "🛍️ Cart Items:\n\n";
    let total = 0;
    cart.forEach(item => {
      msg += `\( {item.name} - ₹ \){item.price}\n`;
      total += item.price;
    });
    msg += `\nTotal: ₹${total}`;
    alert(msg || "Cart empty hai");
  }

  function showAdmin() {
    alert("👑 Admin Panel\nProducts add karne ke liye GitHub se code update karo");
  }

  renderProducts();
</script>
</body>
</html>
